<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HubSchedule Submissions</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>Recent HubSpot Submissions</h1>
          <p id="formMeta" class="muted">Loading form details…</p>
        </div>
        <button id="refreshButton" class="primary">Refresh</button>
      </header>

      <section id="status" class="status muted">Initializing…</section>
      <section id="submissionList" class="submission-list"></section>
    </main>

    <template id="submissionTemplate">
      <article class="submission-card">
        <div class="submission-card-top">
          <h2 data-name>Unknown Contact</h2>
          <span data-date></span>
        </div>
        <dl class="submission-fields" data-fields></dl>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
